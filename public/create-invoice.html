<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Create Invoice | AfriSettle</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-50 text-slate-950">
    <div class="min-h-screen lg:flex">
      <aside class="border-b border-slate-200 bg-white lg:w-72 lg:border-b-0 lg:border-r">
        <div class="flex h-16 items-center gap-3 px-6">
          <div class="flex h-9 w-9 items-center justify-center rounded bg-emerald-600 text-sm font-bold text-white">
            AS
          </div>
          <div>
            <p class="text-base font-semibold tracking-tight">AfriSettle</p>
            <p class="text-xs text-slate-500">Merchant Console</p>
          </div>
        </div>
        <nav class="flex gap-2 overflow-x-auto px-4 pb-4 lg:block lg:space-y-1 lg:overflow-visible lg:px-3">
          <a class="block rounded px-3 py-2 text-sm font-medium text-slate-600" href="/dashboard">Dashboard</a>
          <a class="block rounded bg-emerald-50 px-3 py-2 text-sm font-medium text-emerald-700" href="/create-invoice">Create Invoice</a>
          <a class="block rounded px-3 py-2 text-sm font-medium text-slate-600" href="#">Invoices</a>
          <a class="block rounded px-3 py-2 text-sm font-medium text-slate-600" href="#">Payments</a>
          <a class="block rounded px-3 py-2 text-sm font-medium text-slate-600" href="/wallets">Wallets</a>
          <a class="block rounded px-3 py-2 text-sm font-medium text-slate-600" href="/settings">Settings</a>
        </nav>
      </aside>

      <main class="flex-1">
        <header class="border-b border-slate-200 bg-white">
          <div class="px-6 py-5 lg:px-8">
            <h1 class="text-xl font-semibold tracking-tight">Create Invoice</h1>
            <p class="mt-1 text-sm text-slate-500">Create a new payment request for your customer.</p>
          </div>
        </header>

        <div class="px-6 py-6 lg:px-8">
          <div class="max-w-3xl">
            <div id="api-key-error" class="hidden mb-4 rounded border border-red-200 bg-red-50 px-4 py-3 text-sm font-medium text-red-700"></div>
            <div id="form-error" class="hidden mb-4 rounded border border-red-200 bg-red-50 px-4 py-3 text-sm font-medium text-red-700"></div>
            <div id="success-state" class="hidden rounded border border-emerald-200 bg-emerald-50 p-6">
              <p class="text-sm font-semibold text-emerald-800">Invoice created successfully</p>
              <p class="mt-2 text-sm text-emerald-700">
                Invoice <span id="created-invoice-number" class="font-semibold"></span> is ready.
              </p>
              <a class="mt-5 inline-flex h-10 items-center rounded bg-emerald-600 px-4 text-sm font-semibold text-white" href="/dashboard">
                View Dashboard
              </a>
            </div>

            <form id="invoice-form" class="rounded border border-slate-200 bg-white">
              <div class="border-b border-slate-200 px-6 py-4">
                <h2 class="text-base font-semibold tracking-tight">Invoice Details</h2>
              </div>
              <div class="grid gap-5 p-6 sm:grid-cols-2">
                <label class="block">
                  <span class="text-sm font-medium text-slate-700">Invoice Number</span>
                  <input class="mt-2 h-10 w-full rounded border border-slate-300 px-3 text-sm outline-none focus:border-emerald-600 focus:ring-2 focus:ring-emerald-100" name="invoiceNumber" required />
                </label>
                <label class="block">
                  <span class="text-sm font-medium text-slate-700">Customer Name</span>
                  <input class="mt-2 h-10 w-full rounded border border-slate-300 px-3 text-sm outline-none focus:border-emerald-600 focus:ring-2 focus:ring-emerald-100" name="customerName" required />
                </label>
                <label class="block">
                  <span class="text-sm font-medium text-slate-700">Customer Email</span>
                  <input class="mt-2 h-10 w-full rounded border border-slate-300 px-3 text-sm outline-none focus:border-emerald-600 focus:ring-2 focus:ring-emerald-100" name="customerEmail" required type="email" />
                </label>
                <label class="block">
                  <span class="text-sm font-medium text-slate-700">Amount</span>
                  <input class="mt-2 h-10 w-full rounded border border-slate-300 px-3 text-sm outline-none focus:border-emerald-600 focus:ring-2 focus:ring-emerald-100" min="0.01" name="amount" required step="0.01" type="number" />
                </label>
                <label class="block">
                  <span class="text-sm font-medium text-slate-700">Currency</span>
                  <input class="mt-2 h-10 w-full rounded border border-slate-300 px-3 text-sm uppercase outline-none focus:border-emerald-600 focus:ring-2 focus:ring-emerald-100" maxlength="3" name="currency" required value="USD" />
                </label>
                <label class="block">
                  <span class="text-sm font-medium text-slate-700">Due Date</span>
                  <input class="mt-2 h-10 w-full rounded border border-slate-300 px-3 text-sm outline-none focus:border-emerald-600 focus:ring-2 focus:ring-emerald-100" name="dueDate" type="date" />
                </label>
                <label class="block sm:col-span-2">
                  <span class="text-sm font-medium text-slate-700">Description <span class="font-normal text-slate-400">(optional)</span></span>
                  <textarea class="mt-2 min-h-28 w-full rounded border border-slate-300 px-3 py-2 text-sm outline-none focus:border-emerald-600 focus:ring-2 focus:ring-emerald-100" name="description"></textarea>
                </label>
              </div>
              <div class="flex items-center justify-end border-t border-slate-200 px-6 py-4">
                <button id="submit-button" class="h-10 rounded bg-emerald-600 px-5 text-sm font-semibold text-white disabled:cursor-not-allowed disabled:opacity-60" type="submit">
                  Create Invoice
                </button>
              </div>
            </form>
          </div>
        </div>
      </main>
    </div>
    <script src="/create-invoice.js"></script>
  </body>
</html>
