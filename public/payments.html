<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Payments | AfriSettle</title>
    <link rel="icon" href="/assets/logo/favicon.png" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-[#f7f9fc] text-[#07182f]">
    <div class="min-h-screen lg:flex">
      <aside class="bg-[#06172d] text-white lg:fixed lg:inset-y-0 lg:left-0 lg:flex lg:w-72 lg:flex-col">
        <div class="flex h-24 items-center px-7"><img class="h-12 w-auto" src="/assets/logo/afrisettle-light.png" alt="AfriSettle" /></div>
        <div class="mx-5 rounded-2xl border border-white/10 bg-white/[0.05] p-4"><p class="text-sm font-black">Lagos Digital Hub</p><p class="mt-1 w-fit rounded-full bg-emerald-400/10 px-2 py-1 text-xs font-black text-emerald-300">Verified Merchant</p></div>
        <nav class="mt-8 space-y-2 px-5">
          <a class="block rounded-2xl px-4 py-3 text-sm font-bold text-slate-300 hover:bg-white/10" href="/dashboard">Dashboard</a>
          <a class="block rounded-2xl px-4 py-3 text-sm font-bold text-slate-300 hover:bg-white/10" href="/invoices">Invoices</a>
          <a class="block rounded-2xl bg-[#1557ff] px-4 py-3 text-sm font-black" href="/payments">Payments</a>
          <a class="block rounded-2xl px-4 py-3 text-sm font-bold text-slate-300 hover:bg-white/10" href="/wallets">Wallets</a>
          <a class="block rounded-2xl px-4 py-3 text-sm font-bold text-slate-300 hover:bg-white/10" href="/dashboard#analytics">Analytics</a>
          <a class="block rounded-2xl px-4 py-3 text-sm font-bold text-slate-300 hover:bg-white/10" href="/settings">Settings</a>
        </nav>
      </aside>
      <main class="flex-1 lg:ml-72">
        <header class="border-b border-slate-200 bg-white">
          <div class="flex flex-col gap-4 px-5 py-5 lg:flex-row lg:items-center lg:justify-between lg:px-8">
            <input id="api-key-input" class="h-12 max-w-xl rounded-xl border border-slate-200 px-4 text-sm outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100" type="password" placeholder="Merchant API key" />
            <a class="inline-flex h-12 items-center rounded-xl bg-[#1557ff] px-5 text-sm font-black text-white" href="/create-invoice">+ Create Invoice</a>
          </div>
        </header>
        <div class="space-y-6 px-5 py-6 lg:px-8">
          <div><h1 class="text-3xl font-black">Payments</h1><p class="mt-1 text-slate-600">Track detected, confirmed and failed payments.</p></div>
          <div id="message" class="hidden rounded-2xl border px-4 py-3 text-sm font-bold"></div>
          <section class="grid gap-5 md:grid-cols-3">
            <div class="rounded-2xl border border-slate-200 bg-white p-5"><p class="text-sm font-bold text-slate-500">Confirmed Volume</p><p id="confirmed-volume" class="mt-3 text-3xl font-black">0 USDC</p></div>
            <div class="rounded-2xl border border-slate-200 bg-white p-5"><p class="text-sm font-bold text-slate-500">Detected Payments</p><p id="detected-count" class="mt-3 text-3xl font-black">0</p></div>
            <div class="rounded-2xl border border-slate-200 bg-white p-5"><p class="text-sm font-bold text-slate-500">Failed Payments</p><p id="failed-count" class="mt-3 text-3xl font-black">0</p></div>
          </section>
          <section class="rounded-2xl border border-slate-200 bg-white p-5">
            <div class="flex items-center justify-between"><h2 class="text-lg font-black">Recent Payments</h2><button id="refresh-button" class="rounded-xl border border-slate-200 px-4 py-2 text-sm font-black">Refresh</button></div>
            <div id="loading-state" class="mt-5 rounded-xl bg-slate-50 p-4 text-sm font-semibold text-slate-600">Loading payments...</div>
            <div id="payment-table" class="mt-5 overflow-hidden rounded-xl border border-slate-100"></div>
            <div id="empty-state" class="hidden mt-5 rounded-xl border border-dashed border-slate-200 p-10 text-center text-sm text-slate-500">No payments found.</div>
          </section>
        </div>
      </main>
    </div>
    <script src="/payments.js"></script>
  </body>
</html>
