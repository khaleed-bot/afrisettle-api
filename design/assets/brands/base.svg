<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Clip path to keep the gradient perfectly circular -->
    <clipPath id="circle-clip">
      <circle cx="250" cy="250" r="250" />
    </clipPath>
  </defs>

  <!-- Rendered circle with the conic gradient matching image_dd8641.png -->
  <g clip-path="url(#circle-clip)">
    <foreignObject x="0" y="0" width="500" height="500">
      <div xmlns="http://www.w3.org/1999/xhtml" style="
        width: 100%;
        height: 100%;
        background: conic-gradient(from 270deg, #ffffff 0%, #a3c2ff 25%, #4d88ff 50%, #0055ff 100%);
      " />
    </foreignObject>
  </g>
</svg>
